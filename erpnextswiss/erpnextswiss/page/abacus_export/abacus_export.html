<div style="margin: 5px; margin-top: 0px; border-top: 1px solid white; ">
  <p class="text-muted">Exportiert Ausgangsrechnungen und Zahlungseinträge in eine Abacus-Transferdatei.</p>

  <div class="row">
    <div class="form-column col-sm-6">
      <p>Periode</p>
      <input type="date" id="start_date" name="start_date" />
      <label for="start">&nbsp;bis&nbsp;</label>
      <input type="date" id="end_date" name="end_date" />&nbsp;
      <input type="checkbox" id="chk-aggregated" name="aggregated"><label for="chk-aggregated">&nbsp;Aggregiert&nbsp;</label>
		<div class="form-group" style="width: 118px;">
			<label for="limit">Datensatzlimit</label>
			<select class="form-control" id="limit">
				<option>10000</option>
				<option>5000</option>
				<option>2000</option>
				<option>1000</option>
				<option>500</option>
			</select>
		</div>
    </div>

    <div class="form-column col-sm-6">
      <p>Datei erstellen</p>
      <button type="submit" class="btn btn-sm btn-primary btn-create-file">Datei erstellen</button>
      <div class="waiting-gif hide" id="waiting-gif"><img src="/assets/frappe/images/ui/ajax-loader.gif" /></div>
    </div>	  
  </div>

  <div class="row">
    <div class="form-column col-sm-12" id="preview"></div>
  </div>

</div>
