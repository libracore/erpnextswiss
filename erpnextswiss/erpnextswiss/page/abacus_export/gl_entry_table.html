<table class="table">
  <thead class="thead-light">
    <tr>
        <th scope="col">Datum</th>
        <th scope="col">Dokument</th>
        <th scope="col">Konto</th>
        <th scope="col">Betrag</th>
    </tr>
  </thead>
    {% for m in message %}
    <tr>
        <td>{{ m.date }}</td>
        <td><a href="/desk#Form/{{ m.type }}/{{ m.name }}">{{ m.name }}</a></td>
        <td>{{ m.account }}</td>
        <td>{{ m.amount }}</td>
    </tr>
    {% endfor %}    

</table>
