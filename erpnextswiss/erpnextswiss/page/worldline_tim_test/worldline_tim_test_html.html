<!DOCTYPE html>
<html>
    <head>
    <title>Einfaches Beispiel ECR TimApi</title>
    <meta http-equiv="Content-Type" content="text/html;charset=ISO-8859-1">
    <script src="/assets/erpnextswiss/js/tim/testing/timapi.js"></script>
    </head>
    <body>
    <div class="ecr" id="mainEcr">
        <h1>Einfaches Beispiel ECR</h1>
        <div class="display">
            <div id="display-line1">&nbsp;</div>
            <div id="display-line2">&nbsp;</div>
        </div>
        <div class="control">
            <form>
                <fieldset>
                    <legend>Transaktionsparameter</legend>
                    <div class="row">
                        <label>Betrag CHF (in Rappen):</label>
                        <input id="editAmount" class="ui-widget ui-widget-content ui-corner-all" value="850" size="6"/>
                    </div>
                    <div class="row">
                        <label>Letzte Transaktionssequenz: </label>
                        <input id="lastTransaction" class="ui-widget ui-widget-content ui-corner-all" value="0" size="6"/>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Finanzfunktionen</legend>
                    <button id="btnPurchase">Kauf</button>
                    <button id="btnCredit">Gutschrift</button>
                    <button id="btnCommit">Commit</button>
                    <button id="btnRollblack">Rollback</button>
                    <button id="btnReversal">Storno</button>
                </fieldset>
                <fieldset>
                    <legend>Weitere Funktionen</legend>
                    <button id="btnBalance">Saldo</button>
                    <button id="btnReconciliation">Abstimmung</button>
                    <button id="btnReconfig">Reconfig</button>
                    <button id="btnCancel">Abbrechen</button>
                </fieldset>
                <fieldset>
                    <legend>Statusverwaltung</legend>
                    <button id="btnConnect">Verbinden</button>
                    <button id="btnDisconnect">Trennen</button>
                    <button id="btnLogin">Login</button>
                    <button id="btnLogout">Logout</button>
                    <button id="btnActivate">Aktivieren</button>
                    <button id="btnDeactivate">Deaktivieren</button>
                </fieldset>
            </form>
        </div>
    </div>
  </body>
</html>
