<table style="width: 100%; " class="table">
    <tr>
        <th></th>
        <th>Zahlung</th>
        <th>Kunde</th>
        <th>Datum</th>
        <th>Betrag</th>
        <th>Bemerkungen</th>
    </tr>
    {% for payment_entry in unallocated_payment_entries %}
    <tr>
        <td><input type="radio" id="rad{{ payment_entry.name }}" name="payment" value="{{ payment_entry.name }}"></td>
        <td><a href="/desk#Form/Payment Entry/{{ payment_entry.name }}">{{ payment_entry.name }}</a></td>
        <td>{{ payment_entry.party }}</td>
        <td>{{ payment_entry.posting_date }}</td>
        <td>{{ payment_entry.paid_amount }}</td>
        <td>{{ payment_entry.remarks }}</td>
    </tr>
    {% endfor %}
</table>
